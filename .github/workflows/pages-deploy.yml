name: "Build and Deploy"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      # 构建站点到 _site 目录，强制 baseurl 为空（根路径）
      - name: Build site
        run: bundle exec jekyll build -d "_site" --baseurl ""
        env:
          JEKYLL_ENV: "production"

      # 上传 artifact，使用唯一名称避免冲突
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
          name: github-pages-${{ github.run_id }}  # 使用运行ID确保唯一

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}  # 与上传名称一致
